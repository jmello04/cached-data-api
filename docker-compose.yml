version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cached_data_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/financial_db
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/financial_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cached_data_seed
    command: python scripts/seed.py 5000
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/financial_db
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/financial_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - seed

  db:
    image: postgres:16-alpine
    container_name: cached_data_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: cached_data_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
