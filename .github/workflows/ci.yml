name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências do sistema
        run: sudo apt-get install -y --no-install-recommends libpq-dev gcc

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar importações e estrutura
        run: python -c "from app.main import app; print('Importação da aplicação: OK')"

      - name: Executar suíte de testes
        run: pytest -v --tb=short

      - name: Verificar sintaxe de todos os módulos
        run: python -m py_compile $(find app scripts tests -name "*.py" | tr '\n' ' ')
